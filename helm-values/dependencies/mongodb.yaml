architecture: standalone
useStatefulSet: true

auth:
  enabled: true
  rootUser: root
  usernames:
    - forum_user
  databases:
    - forum_db
  existingSecret: mongodb-auth

nodeSelector:
  workload-role: business

persistence:
  enabled: true
  size: 2Gi

volumePermissions:
  enabled: false

metrics:
  enabled: false