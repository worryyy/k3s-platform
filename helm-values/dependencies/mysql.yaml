# Bitnami MySQL values for forum-api.
#
# Install example:
# helm upgrade --install mysql oci://registry-1.docker.io/bitnamicharts/mysql \
#   --namespace app --create-namespace \
#   -f helm-values/dependencies/mysql.yaml
#
# The mysql-auth Secret is read by the MySQL chart, not by forum-api.
# Required keys:
# - mysql-root-password
# - mysql-password
# - mysql-replication-password

global:
  security:
    allowInsecureImages: true

architecture: replication

image:
  registry: docker.io
  repository: bitnamilegacy/mysql
  tag: 9.4.0-debian-12-r1
  pullPolicy: IfNotPresent

auth:
  createDatabase: true
  database: forum_db
  username: forum_user
  existingSecret: mysql-auth

primary:
  podAntiAffinityPreset: ""
  nodeSelector:
    kubernetes.io/hostname: node1
  persistence:
    enabled: true
    size: 2Gi

secondary:
  replicaCount: 1
  podAntiAffinityPreset: ""
  nodeSelector:
    kubernetes.io/hostname: node2
  persistence:
    enabled: true
    size: 2Gi

metrics:
  enabled: false
