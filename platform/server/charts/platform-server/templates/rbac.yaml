{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "platform-server.fullname" . }}
  labels:
    {{- include "platform-server.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources:
      - pods
      - services
      - configmaps
      - secrets
      - events
    verbs:
      - get
      - list
      - watch
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "platform-server.fullname" . }}
  labels:
    {{- include "platform-server.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "platform-server.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "platform-server.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}