---
- name: Read kubeconfig from k3s server
  hosts: k3s_server
  become: yes
  vars_files:
    - ../inventory/group_vars/all.yml
  tasks:
    - name: Show kubeconfig path
      shell: |
        hostname
        ls -l /etc/rancher/k3s/k3s.yaml
      changed_when: false

    - name: Read kubeconfig content
      command: cat /etc/rancher/k3s/k3s.yaml
      register: k3s_kubeconfig_content
      changed_when: false

    - name: Store kubeconfig as host fact
      set_fact:
        exported_kubeconfig: "{{ k3s_kubeconfig_content.stdout }}"


- name: Write kubeconfig to local control machine
  hosts: localhost
  connection: local
  vars_files:
    - ../inventory/group_vars/all.yml
  tasks:
    - name: Resolve k3s server host
      set_fact:
        kubeconfig_server_host: "{{ groups['k3s_server'][0] }}"

    - name: Resolve k3s server IP
      set_fact:
        kubeconfig_server_ip: "{{ hostvars[kubeconfig_server_host]['ansible_host'] }}"

    - name: Render local kubeconfig
      set_fact:
        local_kubeconfig_content: >-
          {{ hostvars[kubeconfig_server_host]['exported_kubeconfig']
             | replace('127.0.0.1', kubeconfig_server_ip)
             | replace('localhost', kubeconfig_server_ip) }}

    - name: Create local kube config directory
      file:
        path: "{{ lookup('env', 'HOME') }}/.kube"
        state: directory
        mode: "0700"

    - name: Backup existing kubeconfig
      shell: |
        if [ -f "{{ lookup('env', 'HOME') }}/.kube/config" ]; then
          cp "{{ lookup('env', 'HOME') }}/.kube/config" "{{ lookup('env', 'HOME') }}/.kube/config.bak.$(date +%Y%m%d%H%M%S)"
        fi
      changed_when: false

    - name: Write kubeconfig locally
      copy:
        dest: "{{ kubeconfig_local_path | default(lookup('env', 'HOME') + '/.kube/config') }}"
        content: "{{ local_kubeconfig_content }}"
        mode: "0600"

    - name: Show kubeconfig server
      shell: |
        grep -n "server:" "{{ kubeconfig_local_path | default(lookup('env', 'HOME') + '/.kube/config') }}"
      register: kubeconfig_server_line
      changed_when: false

    - name: Print kubeconfig server
      debug:
        var: kubeconfig_server_line.stdout_lines
