# Example Secret read by the Bitnami MongoDB chart.
#
# It is referenced by helm-values/dependencies/mongodb.yaml:
# auth.existingSecret: mongodb-auth
#
# mongodb-passwords is the password for forum_user in the current standalone
# single-user setup. It must match the password embedded in
# forum-api-secrets.example.yaml MONGO_URI.
#
# If metrics or replica set auth are enabled later, Bitnami may also require
# keys such as mongodb-metrics-password or mongodb-replica-set-key.
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-auth
  namespace: app
type: Opaque
stringData:
  mongodb-root-password: "CHANGE_ME_MONGODB_ROOT_PASSWORD"
  mongodb-passwords: "CHANGE_ME_FORUM_USER_PASSWORD"
