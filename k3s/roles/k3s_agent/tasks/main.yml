---
- name: Check unexpected k3s server service on agent node
  stat:
    path: /etc/systemd/system/k3s.service
  register: unexpected_k3s_server_service

- name: Fail if agent node has k3s server service
  fail:
    msg: >
      This node already has k3s.service, which means it was installed as a k3s server before.
      Please run /usr/local/bin/k3s-uninstall.sh on this agent node before installing k3s-agent.
  when: unexpected_k3s_server_service.stat.exists

- name: Resolve k3s server host
  set_fact:
    k3s_join_server_host: "{{ groups['k3s_server'][0] }}"

- name: Resolve k3s server IP
  set_fact:
    k3s_join_server_ip: "{{ hostvars[k3s_join_server_host]['ansible_host'] }}"

- name: Read k3s token from server
  slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: agent_token_file
  delegate_to: "{{ k3s_join_server_host }}"
  become: yes
  no_log: true

- name: Resolve k3s token for agent
  set_fact:
    k3s_join_token: "{{ agent_token_file.content | b64decode | trim }}"
  no_log: true

- name: Debug k3s join info
  debug:
    msg:
      - "k3s_join_server_host={{ k3s_join_server_host }}"
      - "k3s_join_server_ip={{ k3s_join_server_ip }}"
      - "current_agent={{ inventory_hostname }}"
      - "agent_ip={{ ansible_host }}"
      - "token_length={{ k3s_join_token | length }}"

- name: Check connectivity from agent to k3s server 6443
  wait_for:
    host: "{{ k3s_join_server_ip }}"
    port: 6443
    timeout: 10

- name: Download k3s install script from Rancher CN mirror
  get_url:
    url: "{{ k3s_install_script_url }}"
    dest: /tmp/install-k3s.sh
    mode: "0755"
    timeout: 60

- name: Build k3s agent install command
  set_fact:
    k3s_agent_install_cmd: >-
      timeout 300 /tmp/install-k3s.sh agent
      --flannel-iface={{ k3s_flannel_iface }}
      --node-ip={{ ansible_host }}
      --node-label node-type=worker

- name: Install k3s agent without starting service
  shell: "{{ k3s_agent_install_cmd }}"
  args:
    executable: /bin/bash
    creates: /etc/systemd/system/k3s-agent.service
  environment:
    INSTALL_K3S_MIRROR: "{{ k3s_mirror }}"
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
    INSTALL_K3S_SKIP_START: "true"
    K3S_URL: "https://{{ k3s_join_server_ip }}:6443"
    K3S_TOKEN: "{{ k3s_join_token }}"
  register: k3s_agent_install_result
  no_log: true

- name: Check k3s-agent service file
  stat:
    path: /etc/systemd/system/k3s-agent.service
  register: k3s_agent_service_file

- name: Fail if k3s-agent service file does not exist
  fail:
    msg: "k3s-agent.service was not created. Check install stdout/stderr above."
  when: not k3s_agent_service_file.stat.exists

- name: Reload systemd
  systemd:
    daemon_reload: yes

- name: Ensure k3s-agent service is enabled and started
  systemd:
    name: k3s-agent
    state: started
    enabled: yes

- name: Show k3s agent status
  command: systemctl status k3s-agent --no-pager
  register: k3s_agent_status
  changed_when: false
  failed_when: false

- name: Print k3s agent status
  debug:
    var: k3s_agent_status.stdout_lines
