---
- name: Check unexpected k3s-agent service on server node
  stat:
    path: /etc/systemd/system/k3s-agent.service
  register: unexpected_k3s_agent_service

- name: Fail if server node has k3s-agent service
  fail:
    msg: >
      This node already has k3s-agent.service, which means it was installed as an agent before.
      Please run /usr/local/bin/k3s-agent-uninstall.sh on this server node before installing k3s server.
  when: unexpected_k3s_agent_service.stat.exists

- name: Download k3s install script from Rancher CN mirror
  get_url:
    url: "{{ k3s_install_script_url }}"
    dest: /tmp/install-k3s.sh
    mode: "0755"
    timeout: 60

- name: Build k3s server install command
  set_fact:
    k3s_server_install_cmd: >-
      timeout 300 /bin/bash -c '
      INSTALL_K3S_MIRROR={{ k3s_mirror }}
      INSTALL_K3S_VERSION={{ k3s_version }}
      /tmp/install-k3s.sh server
      --node-label node-type=control
      --advertise-address={{ ansible_host }}
      --node-ip={{ ansible_host }}
      --tls-san={{ ansible_host }}
      --flannel-iface={{ k3s_flannel_iface }}
      {% if disable_traefik | bool %} --disable traefik {% endif %}
      '

- name: Print k3s server install command
  debug:
    var: k3s_server_install_cmd

- name: Install k3s server
  shell: "{{ k3s_server_install_cmd }}"
  args:
    executable: /bin/bash
    creates: /etc/systemd/system/k3s.service
  register: k3s_server_install_result

- name: Print k3s server install stdout
  debug:
    var: k3s_server_install_result.stdout_lines

- name: Print k3s server install stderr
  debug:
    var: k3s_server_install_result.stderr_lines

- name: Check k3s server service file
  stat:
    path: /etc/systemd/system/k3s.service
  register: k3s_server_service_file

- name: Fail if k3s server service file does not exist
  fail:
    msg: "k3s.service was not created. Check install stdout/stderr above."
  when: not k3s_server_service_file.stat.exists

- name: Reload systemd
  systemd:
    daemon_reload: yes

- name: Ensure k3s service is enabled and started
  systemd:
    name: k3s
    state: started
    enabled: yes

- name: Wait for node token
  wait_for:
    path: /var/lib/rancher/k3s/server/node-token
    timeout: 120

- name: Read k3s node token
  slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_token_file
  no_log: true

- name: Save k3s token as host fact
  set_fact:
    k3s_token: "{{ k3s_token_file.content | b64decode | trim }}"
  no_log: true

- name: Wait for kube-apiserver
  wait_for:
    host: "{{ ansible_host }}"
    port: 6443
    timeout: 180

- name: Show k3s server status
  command: systemctl status k3s --no-pager
  register: k3s_status
  changed_when: false
  failed_when: false

- name: Print k3s server status
  debug:
    var: k3s_status.stdout_lines
