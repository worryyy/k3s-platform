auth:
  existingPasswordSecret: platform-rabbitmq-auth
  username: platform_user

global:
  security:
    allowInsecureImages: true 

image:
  registry: docker.io
  repository: bitnamilegacy/rabbitmq
  tag: 4.1.3-debian-12-r1

nodeSelector:
  platform-role: light

persistence:
  enabled: true
  size: 2Gi

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

metrics:
  enabled: false