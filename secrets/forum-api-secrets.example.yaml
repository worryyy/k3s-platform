# Example Secret read by the forum-api business Deployment.
#
# Copy this file before use and replace CHANGE_ME_* placeholders with real
# values. Do not commit the copied file with real credentials.
#
# MONGO_DATABASE is intentionally not stored here. It is provided by the
# forum-api ConfigMap rendered from charts/forum-api/values.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: forum-api-secrets
  namespace: app
type: Opaque
stringData:
  MYSQL_DSN: "forum_user:CHANGE_ME_FORUM_USER_PASSWORD@tcp(mysql-primary.app.svc.cluster.local:3306)/forum_db?parseTime=true&charset=utf8mb4&loc=Local"
  MONGO_URI: "mongodb://forum_user:CHANGE_ME_FORUM_USER_PASSWORD@mongodb.app.svc.cluster.local:27017/forum_db"
