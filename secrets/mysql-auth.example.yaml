# Example Secret read by the Bitnami MySQL chart.
#
# It is referenced by helm-values/dependencies/mysql.yaml:
# auth.existingSecret: mysql-auth
#
# mysql-password is the password for forum_user. It must match the password
# embedded in forum-api-secrets.example.yaml MYSQL_DSN.
apiVersion: v1
kind: Secret
metadata:
  name: mysql-auth
  namespace: app
type: Opaque
stringData:
  mysql-root-password: "CHANGE_ME_MYSQL_ROOT_PASSWORD"
  mysql-password: "CHANGE_ME_FORUM_USER_PASSWORD"
  mysql-replication-password: "CHANGE_ME_MYSQL_REPLICATION_PASSWORD"
